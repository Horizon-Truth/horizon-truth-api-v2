version: "3.9"

services:
  backend:
    # IMAGE and IMAGE_TAG are supplied at deploy time via `--env-file image.env`
    # (written by the CI workflow) so no source is built on this server.
    image: ${IMAGE}:${IMAGE_TAG:-latest}
    container_name: horizon-backend
    restart: unless-stopped

    env_file:
      - .env

    # Overrides whatever is set in .env for the DB host, so the container
    # always reaches Postgres on the host machine instead of trying
    # localhost/127.0.0.1 (which inside the container means itself).
    # Rename DB_HOST below if your TypeORM config reads a different key
    # (e.g. DATABASE_HOST, POSTGRES_HOST, TYPEORM_HOST).
    environment:
      - DB_HOST=host.docker.internal

    ports:
      - "${PORT:-3000}:3000"

    extra_hosts:
      - "host.docker.internal:host-gateway"
