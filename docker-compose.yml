version: "3.9"

services:
  backend:
    image: node:22-alpine
    container_name: horizon-backend
    working_dir: /app
    command: sh -c "npm install && npm run build && node dist/main.js"
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${PORT:-3000}:3000"

    volumes:
      - .:/app
      - /app/node_modules

    extra_hosts:
      - "host.docker.internal:host-gateway"