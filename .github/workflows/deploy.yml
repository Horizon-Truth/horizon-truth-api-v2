name: Deploy Horizon Truth API (Docker Compose)

on:
  push:
    branches:
      - main
      - dev
      - stage

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Determine Deployment Directory
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DEPLOY_SUBDIR=current" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "DEPLOY_SUBDIR=dev" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "stage" ]]; then
            echo "DEPLOY_SUBDIR=stage" >> $GITHUB_ENV
          fi

      - name: Deploy to Server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -e

          DEPLOY_DIR="$DEPLOY_SUBDIR"

          echo "Deploying to $DEPLOY_PATH/$DEPLOY_DIR"

          # Ensure deployment directory exists
          ssh -o StrictHostKeyChecking=no $USER@$HOST "mkdir -p $DEPLOY_PATH/$DEPLOY_DIR"

          # Sync project files
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".env" \
            ./ \
            $USER@$HOST:$DEPLOY_PATH/$DEPLOY_DIR/

          # Build and restart containers
          ssh -o StrictHostKeyChecking=no $USER@$HOST << EOF
            set -e

            cd $DEPLOY_PATH/$DEPLOY_DIR

            echo "Stopping old containers..."
            docker compose down

            echo "Building latest image..."
            docker compose build --no-cache

            echo "Starting containers..."
            docker compose up -d

            echo "Removing unused Docker resources..."
            docker image prune -f

            echo "Current running containers:"
            docker compose ps
          EOF