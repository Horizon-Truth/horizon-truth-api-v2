name: Deploy Horizon Truth API (Docker Compose)

on:
  push:
    branches:
      - main
      - dev
      - stage

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read

    steps:
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Determine Deployment Directory
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "DEPLOY_SUBDIR=current" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "DEPLOY_SUBDIR=dev" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "stage" ]]; then
            echo "DEPLOY_SUBDIR=stage" >> $GITHUB_ENV
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Write image.env
        run: |
          echo "IMAGE=${{ needs.build-and-push.outputs.image }}" > image.env
          echo "IMAGE_TAG=${{ github.ref_name }}" >> image.env

      - name: Deploy to Server
        env:
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          set -e

          DEPLOY_DIR="$DEPLOY_SUBDIR"

          echo "Deploying to $DEPLOY_PATH/$DEPLOY_DIR"

          # Ensure deployment directory exists
          ssh -o StrictHostKeyChecking=no $USER@$HOST "mkdir -p $DEPLOY_PATH/$DEPLOY_DIR"

          # Only ship the compose file + image reference. The app itself is
          # a prebuilt image pulled from GHCR — no source lives on the server,
          # so nothing gets rebuilt here and deploys take seconds, not minutes.
          rsync -az \
            docker-compose.yml image.env \
            $USER@$HOST:$DEPLOY_PATH/$DEPLOY_DIR/

          ssh -o StrictHostKeyChecking=no $USER@$HOST "
            set -e
            cd $DEPLOY_PATH/$DEPLOY_DIR

            echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin

            echo 'Pulling latest image...'
            docker compose --env-file image.env --env-file .env pull

            echo 'Starting containers...'
            docker compose --env-file image.env --env-file .env up -d

            echo 'Removing unused Docker resources...'
            docker image prune -f

            echo 'Current running containers:'
            docker compose --env-file image.env --env-file .env ps
          "
